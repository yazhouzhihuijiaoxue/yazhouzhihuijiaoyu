<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化学习建议 - 牙周智慧教学平台</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="../styles/global.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 24px;
        }
        
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: #666;
        }
        
        .cards-container {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .advice-card {
            flex: 1;
            min-width: 280px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
            flex: 1;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        
        .priority-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .priority-high {
            background: #fff2f0;
            color: #ff4d4f;
        }
        
        .priority-medium {
            background: #fff7e6;
            color: #fa8c16;
        }
        
        .priority-low {
            background: #f6ffed;
            color: #52c41a;
        }
        
        .time-info {
            font-size: 12px;
            color: #999;
        }
        
        .time-info::before {
            content: '⏱️ ';
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="page-container">
            <div class="page-header">
                <h1 class="page-title">个性化学习建议</h1>
                <p class="page-subtitle">根据您的学习情况，为您推荐以下学习内容</p>
            </div>
            
            <div class="cards-container">
                <div 
                    v-for="(advice, index) in adviceList" 
                    :key="index"
                    class="advice-card"
                >
                    <div class="card-title">{{ advice.title }}</div>
                    <div class="card-desc">{{ advice.description }}</div>
                    <div class="card-footer">
                        <span 
                            class="priority-tag"
                            :class="'priority-' + advice.priorityClass"
                        >
                            优先级：{{ advice.priority }}
                        </span>
                        <span class="time-info">{{ advice.estimatedTime }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        const app = createApp({
            setup() {
                const adviceList = ref([
                    {
                        title: '加强基础知识学习',
                        description: '建议复习牙周基础理论知识，特别是牙周探诊检查相关内容',
                        priority: '高',
                        priorityClass: 'high',
                        estimatedTime: '2小时'
                    },
                    {
                        title: '提升临床操作技能',
                        description: '建议多进行虚拟仿真训练，提高操作规范性和精确度',
                        priority: '中',
                        priorityClass: 'medium',
                        estimatedTime: '3小时'
                    },
                    {
                        title: '加强医患沟通能力',
                        description: '建议参与虚拟学术大厅讨论，提升沟通表达能力',
                        priority: '中',
                        priorityClass: 'medium',
                        estimatedTime: '1小时'
                    }
                ]);
                
                return {
                    adviceList
                };
            }
        });
        
        app.mount('#app');
    </script>
</body>
</html>
