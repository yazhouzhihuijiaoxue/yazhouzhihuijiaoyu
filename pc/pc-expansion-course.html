<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临床&科研拓展课 - 牙周智慧教学平台</title>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../styles/global.css">
    
    <style>
        .expansion-course {
            padding: 0;
            background-color: var(--bg-color);
            min-height: 100vh;
        }
        
        /* 页面头部 */
        .page-header {
            background: white;
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .page-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 课程表格容器 */
        .course-container {
            padding: 24px;
        }
        
        .course-table {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* 表格头部 */
        .table-header {
            display: grid;
            grid-template-columns: 45% 15% 15% 25%;
            background: #F5F7FA;
            font-weight: bold;
            color: #2D3E50;
            font-size: 14px;
            height: 48px;
            align-items: center;
            border-bottom: 1px solid #E0E0E0;
        }
        
        .table-header-cell {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
        }
        
        .table-header-cell:nth-child(1) {
            justify-content: flex-start;
            text-align: left;
        }
        
        .table-header-cell:nth-child(2),
        .table-header-cell:nth-child(3),
        .table-header-cell:nth-child(4) {
            justify-content: center;
            text-align: center;
        }
        
        /* 表格行 */
        .table-row {
            display: grid;
            grid-template-columns: 45% 15% 15% 25%;
            height: 56px;
            align-items: center;
            border-bottom: 1px solid #E0E0E0;
            transition: background-color 0.3s ease;
            background: #FFFFFF;
        }
        
        .table-row:hover {
            background-color: #F5F7FA;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-cell {
            padding: 0 16px;
            font-size: 14px;
            color: #2D3E50;
        }
        
        .table-cell:nth-child(1) {
            justify-content: flex-start;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.4;
            max-height: 2.8em;
        }
        
        .table-cell:nth-child(2),
        .table-cell:nth-child(3),
        .table-cell:nth-child(4) {
            justify-content: center;
            text-align: center;
        }
        
        /* 待定状态样式 */
        .meeting-link.pending {
            color: #B0BEC5;
            font-style: italic;
            cursor: default;
        }
        
        .meeting-link.pending:hover {
            text-decoration: none;
        }
        
        /* 会议号链接样式 */
        .meeting-link {
            color: #1890FF;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .meeting-link:hover {
            color: #096DD9;
            text-decoration: underline;
        }
        
        .meeting-link.pending {
            color: var(--text-secondary);
            cursor: default;
        }
        
        .meeting-link.pending:hover {
            text-decoration: none;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .table-header,
            .table-row {
                grid-template-columns: 1fr;
                height: auto;
                padding: 12px 16px;
            }
            
            .table-header-cell,
            .table-cell {
                justify-content: flex-start;
                text-align: left;
                padding: 4px 0;
            }
            
            .table-header-cell:nth-child(1)::before {
                content: "课程名称：";
                font-weight: bold;
            }
            
            .table-cell:nth-child(2)::before {
                content: "时间：";
                font-weight: bold;
            }
            
            .table-cell:nth-child(3)::before {
                content: "主讲人：";
                font-weight: bold;
            }
            
            .table-cell:nth-child(4)::before {
                content: "会议号：";
                font-weight: bold;
            }
        }
        
        /* 切换按钮样式 */
        .tab-switcher {
            padding: 16px 0;
            display: flex;
            align-items: center;
        }
        
        .tab-button {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #E0E0E0;
            background: #F5F7FA;
            color: #666666;
        }
        
        .tab-button.active {
            background: #00C48C;
            color: #FFFFFF;
            border-color: #00C48C;
            font-weight: 500;
        }
        
        .tab-button:not(:last-child) {
            margin-right: 8px;
        }
    </style>
</head>

                            <div class="table-header-cell">会议号</div>
                        </div>
                        
                        <!-- 表格内容 -->
                        <div v-if="clinicalCourses.length > 0">
                            <div 
                                class="table-row" 
                                v-for="course in clinicalCourses" 
                                :key="course.id"
                            >
                                <div class="table-cell">{{ course.name }}</div>
                                <div class="table-cell">{{ course.time }}</div>
                                <div class="table-cell">{{ course.lecturer }}</div>
                                <div class="table-cell">
                                    <span 
                                        v-if="course.meetingId && course.meetingId !== '待定'"
                                        class="meeting-link"
                                        @click="joinMeeting(course.meetingId)"
                                    >
                                        {{ course.meetingId }}
                                    </span>
                                    <span 
                                        v-else
                                        class="meeting-link pending"
                                    >
                                        待定
                                    </span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 空状态 -->
                        <div v-else class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <h3>暂无课程安排</h3>
