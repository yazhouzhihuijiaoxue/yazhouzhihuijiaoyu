<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级学情报告 - 虚拟仿真训练 - 牙周智慧教学平台</title>
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Element Plus CDN -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../styles/global.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F5F7FA;
            color: #2D3E50;
            line-height: 1.5;
        }
        
        .virtual-training-report-page {
            min-height: 100vh;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 页面头部 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 16px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #2D3E50;
        }
        
        .class-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .class-selector select {
            padding: 8px 12px;
            border: 1px solid #E0E0E0;
            border-radius: 4px;
            background: white;
            color: #2D3E50;
        }
        
        /* 统计数据卡片区域 */
        .stats-cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            flex: 1;
            min-width: calc((100% - 80px) / 6);
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666666;
        }
        
        /* 趋势图区域 */
        .trend-chart-section {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            height: 300px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2D3E50;
            margin-bottom: 16px;
        }
        
        /* 榜单区域 */
        .ranking-section {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #F0F0F0;
            height: 48px;
        }
        
        .ranking-item:last-child {
            border-bottom: none;
        }
        
        .rank-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            margin-right: 12px;
        }
        
        .rank-1 {
            background: #FFD700;
        }
        
        .rank-2 {
            background: #C0C0C0;
        }
        
        .rank-3 {
            background: #CD7F32;
        }
        
        .rank-other {
            background: #999999;
        }
        
        .student-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
            color: #666666;
        }
        
        .student-name {
            flex: 1;
            font-size: 14px;
            color: #2D3E50;
        }
        
        .completion-count {
            font-size: 14px;
            font-weight: 500;
            color: #00C48C;
        }
        
        /* 学员详情列表 */
        .student-list-section {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .student-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .student-table th {
            background: #F5F7FA;
            font-size: 14px;
            font-weight: 600;
            color: #2D3E50;
            height: 48px;
            text-align: left;
            padding: 0 16px;
        }
        
        .student-table td {
            height: 56px;
            padding: 0 16px;
            border-bottom: 1px solid #F0F0F0;
            font-size: 14px;
        }
        
        .student-table tr:hover {
            background: #F5F7FA;
        }
        
        .score-range {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .score-high {
            background: #F6FFED;
            color: #52C41A;
        }
        
        .score-medium {
            background: #FFF7E6;
            color: #FA8C16;
        }
        
        /* 趋势图样式 */
        .trend-chart {
            width: 100%;
            height: 240px;
            position: relative;
        }
        
        .chart-line {
            fill: none;
            stroke: #00C48C;
            stroke-width: 2px;
        }
        
        .chart-point {
            fill: #00C48C;
            r: 3px;
        }
        
        .chart-area {
            fill: rgba(0, 196, 140, 0.1);
        }
        
        .axis-label {
            font-size: 12px;
            color: #666666;
        }
        
        .grid-line {
            stroke: #E0E0E0;
            stroke-dasharray: 2,2;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666666;
        }
        
        /* 趋势图 */
        .trend-chart {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            grid-column: 1 / -1;
        }
        
        .trend-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 20px 0;
        }
        
        .trend-bar {
            flex: 1;
            background: linear-gradient(to top, #00C48C, #4ECDC4);
            border-radius: 4px 4px 0 0;
            position: relative;
            min-height: 20px;
        }
        
        .trend-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666666;
            white-space: nowrap;
        }
        
        .trend-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #00C48C;
            font-weight: 600;
        }
        
        /* 学员榜单 */
        .ranking-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 24px;
        }
        
        .ranking-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #F8F9FA;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .ranking-number {
            width: 24px;
            height: 24px;
            background: #00C48C;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-right: 12px;
        }
        
        /* 分数区间 */
        .score-range-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 24px;
            grid-column: 1 / -1;
        }
        
        .score-range-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .score-range-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #F8F9FA;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .score-range-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .score-90 {
            background: #F6FFED;
            color: #52C41A;
            border: 1px solid #B7EB8F;
        }
        
        .score-80 {
            background: #FFF7E6;
            color: #D46B08;
            border: 1px solid #FFD591;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .content-area {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .ranking-list {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .score-range-list {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="virtual-training-report-page">
            <!-- 页面头部 -->
            <div class="page-header">
                <h1 class="page-title">班级学情报告</h1>
            </div>
            
            <!-- 统计数据卡片区域 -->
            <div class="stats-cards-container">
                <div class="stat-card" v-for="stat in statsData" :key="stat.id">
                    <div class="stat-icon" :style="{ color: stat.color }">{{ stat.icon }}</div>
                    <div class="stat-value" :style="{ color: stat.color }">{{ stat.value }}</div>
                    <div class="stat-label">{{ stat.label }}</div>
                </div>
            </div>
            
            <!-- 趋势图区域 -->
            <div class="trend-chart-section">
                <div class="section-title">学员完成技能趋势图</div>
                <svg class="trend-chart" viewBox="0 0 800 240">
                    <!-- 网格线 -->
                    <line x1="50" y1="30" x2="50" y2="210" class="grid-line" />
                    <line x1="150" y1="30" x2="150" y2="210" class="grid-line" />
                    <line x1="250" y1="30" x2="250" y2="210" class="grid-line" />
                    <line x1="350" y1="30" x2="350" y2="210" class="grid-line" />
                    <line x1="450" y1="30" x2="450" y2="210" class="grid-line" />
                    <line x1="550" y1="30" x2="550" y2="210" class="grid-line" />
                    <line x1="650" y1="30" x2="650" y2="210" class="grid-line" />
                    <line x1="750" y1="30" x2="750" y2="210" class="grid-line" />
                    <line x1="850" y1="30" x2="850" y2="210" class="grid-line" />
                    <line x1="950" y1="30" x2="950" y2="210" class="grid-line" />
                    
                    <!-- 数据点连线 -->
                    <polyline 
                        class="chart-line" 
                        :points="trendLinePoints"
                    />
                    
                    <!-- 填充区域 -->
                    <polygon 
                        class="chart-area" 
                        :points="trendAreaPoints"
                    />
                    
                    <!-- 数据点 -->
                    <circle 
                        v-for="(point, index) in trendPoints" 
                        :key="index"
                        :cx="point.x" 
                        :cy="point.y" 
                        class="chart-point"
                    />
                    
                    <!-- X轴标签 -->
                    <text 
                        v-for="(label, index) in trendLabels" 
                        :key="index"
                        :x="label.x" 
                        :y="label.y" 
                        class="axis-label"
                        text-anchor="middle"
                    >
                        {{ label.text }}
                    </text>
                    
                    <!-- Y轴标签 -->
                     <text x="30" y="30" class="axis-label" text-anchor="end">24</text>
                    <text x="30" y="135" class="axis-label" text-anchor="end">4</text>
                    <text x="30" y="155" class="axis-label" text-anchor="end">3</text>
                    <text x="30" y="175" class="axis-label" text-anchor="end">2</text>
                    <text x="30" y="195" class="axis-label" text-anchor="end">1</text>
                </svg>
            </div>
            
            <!-- 榜单区域 -->
            <div class="ranking-section">
                <div class="section-title">学员完成榜单</div>
                <div class="ranking-list">
                    <div class="ranking-item" v-for="(student, index) in rankingList" :key="index">
                        <div 
                            class="rank-badge"
                            :class="{
                                'rank-1': index === 0,
                                'rank-2': index === 1,
                                'rank-3': index === 2,
                                'rank-other': index > 2
                            }"
                        >
                            {{ index + 1 }}
                        </div>
                        <div class="student-avatar">{{ student.name.charAt(0) }}</div>
                        <div class="student-name">{{ student.name }}</div>
                        <div class="completion-count">{{ student.count }}次</div>
                    </div>
                </div>
            </div>
            
            <!-- 学员详情列表 -->
            <div class="student-list-section">
                <table class="student-table">
                    <thead>
                        <tr>
                            <th style="width: 25%; text-align: left;">学员姓名</th>
                            <th style="width: 25%; text-align: center;">得分区间</th>
                            <th style="width: 25%; text-align: center;">完成次数</th>
                            <th style="width: 25%; text-align: center;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="(student, index) in studentList" :key="index">
                            <td>{{ student.name }}</td>
                            <td style="text-align: center;">
                                <span 
                                    class="score-range"
                                    :class="{ 
                                        'score-high': student.scoreRange === '90分以上', 
                                        'score-medium': student.scoreRange === '80-90分' 
                                    }"
                                >
                                    {{ student.scoreRange }}
                                </span>
                            </td>
                            <td style="text-align: center;">{{ student.completionCount }}</td>
                            <td style="text-align: center;">
                                <button class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">查看详情</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        
        const app = createApp({
            setup() {
                // 班级选择
                const selectedClass = ref('class1');
                
                // 统计数据配置
                const statsData = ref([
                    { id: 1, icon: '👥', value: '24人', label: '总参与人数', color: '#1890FF' },
                    { id: 2, icon: '⏸️', value: '0人', label: '未学习人数', color: '#999999' },
                    { id: 3, icon: '📖', value: '0人', label: '学习中人数', color: '#FA8C16' },
                    { id: 4, icon: '✅', value: '24人', label: '已完成人数', color: '#52C41A' },
                    { id: 5, icon: '🏆', value: '24人', label: '学习合格人数', color: '#00C48C' },
                    { id: 6, icon: '📊', value: '100%', label: '完成率达标人数', color: '#722ED1' }
                ]);
                
                // 趋势数据
                const trendData = ref([
                    { date: '2025-04-11', value: 1 },
                    { date: '2025-04-12', value: 1 },
                    { date: '2025-04-13', value: 2 },
                    { date: '2025-04-14', value: 1 },
                    { date: '2025-04-15', value: 1 },
                    { date: '2025-04-16', value: 1 },
                    { date: '2025-04-17', value: 3 },
                    { date: '2025-04-18', value: 4 },
                    { date: '2025-04-19', value: 4 },
                    { date: '2025-04-20', value: 4 },
                    { date: '2025-04-21', value: 2 },
                    { date: '', value: 0 },
                    { date: '', value: 0 },
                    { date: '', value: 0 },
                    { date: '2025-04-29', value: 24, isBreak: true }
                ]);
                
                // 学员完成榜单
                const rankingList = ref([
                    { name: '徐圆景', count: 10 },
                    { name: '孙恒', count: 8 },
                    { name: '刘婧怡', count: 5 },
                    { name: '刘宗帅', count: 4 },
                    { name: '叶思涵', count: 4 },
                    { name: '武晓瑾', count: 3 },
                    { name: '张澜译', count: 2 },
                    { name: '王芋潼', count: 1 }
                ]);
                
                // 学员详情列表
                const studentList = ref([
                    { name: '胡景日', scoreRange: '80-90分', completionCount: '1次' },
                    { name: '刘宗帅', scoreRange: '90分以上', completionCount: '1次' },
                    { name: '叶思涵', scoreRange: '90分以上', completionCount: '1次' },
                    { name: '张滢', scoreRange: '80-90分', completionCount: '1次' },
                    { name: '邬瑜杰', scoreRange: '80-90分', completionCount: '1次' },
                    { name: '孙恒', scoreRange: '90分以上', completionCount: '1次' },
                    { name: '徐圆景', scoreRange: '90分以上', completionCount: '1次' },
                    { name: '李博一', scoreRange: '80-90分', completionCount: '1次' }
                ]);
                
                // 计算趋势图数据点
                const trendPoints = computed(() => {
                    const maxValue = 10; // 正常显示的最大值
                    const breakMaxValue = 30; // 断点后的最大值
                    const scale = 180 / maxValue; // 210 - 30 = 180
                    const breakStart = trendData.value.findIndex(item => item.isBreak);
                    
                    return trendData.value.map((item, index) => {
                        if (item.isBreak) {
                            return {
                                x: 50 + index * 65,
                                y: 30, // 断点位置在顶部
                                isBreak: true
                            };
                        } else if (index > breakStart && breakStart >= 0) {
                            // 断点后的数据使用不同的比例
                            const breakScale = 180 / breakMaxValue;
                            return {
                                x: 50 + index * 65,
                                y: 210 - (item.value * breakScale),
                                isBreakAfter: true
                            };
                        } else {
                            return {
                                x: 50 + index * 65,
                                y: 210 - (item.value * scale)
                            };
                        }
                    });
                });
                
                // 趋势线路径（处理断点）
                const trendLinePoints = computed(() => {
                    const breakStart = trendData.value.findIndex(item => item.isBreak);
                    return trendPoints.value.map((point, index) => {
                        if (index === breakStart + 1) {
                            return ''; // 断点处不连线
                        }
                        return `${point.x},${point.y}`;
                    }).filter(p => p).join(' ');
                });
                
                // 趋势图填充区域（处理断点）
                const trendAreaPoints = computed(() => {
                    const breakStart = trendData.value.findIndex(item => item.isBreak);
                    const breakPoints = trendPoints.value.slice(0, breakStart + 1);
                    const breakAfterPoints = trendPoints.value.slice(breakStart + 1);
                    
                    let area1 = '';
                    let area2 = '';
                    
                    if (breakPoints.length > 0) {
                        const points1 = breakPoints.map(point => `${point.x},${point.y}`).join(' ');
                        area1 = `50,210 ${points1} ${breakPoints[breakPoints.length - 1].x},210`;
                    }
                    
                    if (breakAfterPoints.length > 0) {
                        const points2 = breakAfterPoints.map(point => `${point.x},${point.y}`).join(' ');
                        area2 = `${breakAfterPoints[0].x},210 ${points2} ${breakAfterPoints[breakAfterPoints.length - 1].x},210`;
                    }
                    
                    return area1 + (area2 ? ' ' + area2 : '');
                });
                
                // X轴标签
                const trendLabels = computed(() => {
                    return trendData.value.map((item, index) => ({
                        x: 50 + index * 65,
                        y: 225,
                        text: item.date.substring(8) // 只显示日期部分
                    }));
                });
                
                return {
                    selectedClass,
                    statsData,
                    trendData,
                    rankingList,
                    studentList,
                    trendPoints,
                    trendLinePoints,
                    trendAreaPoints,
                    trendLabels
                };
            }
        });
        
        app.mount('#app');
    </script>
</body>
</html>
