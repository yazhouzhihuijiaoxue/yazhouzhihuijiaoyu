<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟仿真机学情报告 - 牙周智慧教学平台</title>
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Element Plus CDN -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../styles/global.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F5F7FA;
            color: #2D3E50;
            line-height: 1.5;
        }
        
        .simulator-report-page {
            min-height: 100vh;
            padding: 24px;
        }
        
        /* 页面头部 */
        .page-header {
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #2D3E50;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 16px;
            color: #666666;
        }
        
        /* 内容区域 */
        .content-area {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* 统计卡片 */
        .stats-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #2D3E50;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 3px solid #00C48C;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 16px;
            background: #F8F9FA;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #00C48C;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666666;
        }
        
        /* 最难技能 */
        .difficult-skill {
            background: #FFF7E6;
            border: 1px solid #FFD591;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .difficult-title {
            font-size: 14px;
            font-weight: 600;
            color: #D46B08;
            margin-bottom: 8px;
        }
        
        .difficult-content {
            font-size: 14px;
            color: #D46B08;
        }
        
        /* 证书图标 */
        .certificate-section {
            text-align: center;
            margin-top: 32px;
            padding: 32px;
            background: linear-gradient(135deg, #00C48C, #4ECDC4);
            border-radius: 12px;
            color: white;
        }
        
        .certificate-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .certificate-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .certificate-desc {
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="simulator-report-page">
            <!-- 页面头部 -->
            <div class="page-header">
                <h1 class="page-title">虚拟仿真机学情报告</h1>
                <p class="page-subtitle">班级虚拟仿真机学习情况统计分析</p>
            </div>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 统计信息卡片 -->
                <div class="stats-card">
                    <div class="card-title">训练概况</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">100%</div>
                            <div class="stat-label">平均通过率（≥80分）</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">89</div>
                            <div class="stat-label">平均分</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">24</div>
                            <div class="stat-label">总参与人</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">1</div>
                            <div class="stat-label">最难技能数量</div>
                        </div>
                    </div>
                    
                    <!-- 最难技能 -->
                    <div class="difficult-skill">
                        <div class="difficult-title">最难技能</div>
                        <div class="difficult-content">正确的操作方式</div>
                    </div>
                </div>
                
                <!-- 虚拟通关证书 -->
                <div class="certificate-section">
                    <div class="certificate-icon">🏆</div>
                    <div class="certificate-title">虚拟通关证书</div>
                    <div class="certificate-desc">恭喜班级全体学员完成虚拟仿真机训练</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        const app = createApp({
            setup() {
                return {};
            }
        });
        
        app.mount('#app');
    </script>
</body>
</html>
