<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 牙周智慧教学平台</title>
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- 全局样式 -->
    <link rel="stylesheet" href="styles/global.css">
    
    <style>
        /* 登录页面特定样式 */
        .login-container {
            min-height: 100vh;
            background: url('haibao/beijing.png') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(45, 62, 80, 0.7); /* 深色遮罩，提高文字可读性 */
            z-index: 1;
        }
        
        .login-card {
            position: relative;
            z-index: 2;
        }
        
        .login-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00C48C 0%, #4ECDC4 100%);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            font-size: 32px;
            margin-bottom: 16px;
            color: var(--primary-color);
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .role-selector {
            display: flex;
            background: var(--bg-color);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
        }
        
        .role-option {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .role-option.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 196, 140, 0.3);
        }
        
        .login-form {
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 196, 140, 0.1);
        }
        
        .form-input.error {
            border-color: var(--error-color);
        }
        
        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        
        .login-btn:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 196, 140, 0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-btn .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .demo-info {
            background: rgba(0, 196, 140, 0.1);
            border: 1px solid rgba(0, 196, 140, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        
        .demo-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .demo-account {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .demo-account:last-child {
            margin-bottom: 0;
        }
        
        /* 游客模式样式 */
        .guest-mode {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .guest-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #4ECDC4 0%, #00C48C 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .guest-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }
        
        .guest-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card">
                <!-- 登录头部 -->
                <div class="login-header">
                    <div class="login-logo">🦷</div>
                    <h1 class="login-title">牙周智慧教学平台</h1>
                    <p class="login-subtitle">请选择您的身份并登录系统</p>
                </div>
                
                <!-- 角色选择 -->
                <div class="role-selector">
                    <div 
                        class="role-option" 
                        :class="{ active: loginForm.role === 'teacher' }"
                        @click="loginForm.role = 'teacher'"
                    >
                        教师登录
                    </div>
                    <div 
                        class="role-option" 
                        :class="{ active: loginForm.role === 'student' }"
                        @click="loginForm.role = 'student'"
                    >
                        学生登录
                    </div>
                </div>
                
                <!-- 登录表单 -->
                <form class="login-form" @submit.prevent="handleLogin">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            :class="{ error: errors.username }"
                            v-model="loginForm.username"
                            placeholder="请输入用户名"
                            @input="clearError('username')"
                        >
                        <div class="error-message" :class="{ show: errors.username }">
                            {{ errors.username }}
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input 
                            type="password" 
                            class="form-input" 
                            :class="{ error: errors.password }"
                            v-model="loginForm.password"
                            placeholder="请输入密码"
                            @input="clearError('password')"
                        >
                        <div class="error-message" :class="{ show: errors.password }">
                            {{ errors.password }}
                        </div>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="login-btn"
                        :disabled="isLoading || !isFormValid"
                    >
                        <span v-if="isLoading" class="loading-spinner"></span>
                        {{ isLoading ? '登录中...' : '立即登录' }}
                    </button>
                </form>
                
                <!-- 游客模式按钮 -->
                <div class="guest-mode">
                    <button 
                        class="guest-btn"
                        @click="handleGuestLogin"
                        :disabled="isLoading"
                    >
                        🎯 游客模式登录
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref, computed } = Vue;
        
        const app = createApp({
            setup() {
                // 登录表单数据
                const loginForm = ref({
                    username: '',
                    password: '',
                    role: 'student' // 默认学生角色
                });
                
                // 错误信息
                const errors = ref({
                    username: '',
                    password: ''
                });
                
                // 加载状态
                const isLoading = ref(false);
                
                // 表单是否有效
                const isFormValid = computed(() => {
                    return loginForm.value.username.trim().length >= 3 && 
                           loginForm.value.password.trim().length >= 6;
                });
                
                // 清除错误
                const clearError = (field) => {
                    errors.value[field] = '';
                };
                
                // 表单验证
                const validateForm = () => {
                    let isValid = true;
                    
                    // 用户名验证
                    if (!loginForm.value.username.trim()) {
                        errors.value.username = '请输入用户名';
                        isValid = false;
                    } else if (loginForm.value.username.trim().length < 3) {
                        errors.value.username = '用户名至少3个字符';
                        isValid = false;
                    }
                    
                    // 密码验证
                    if (!loginForm.value.password.trim()) {
                        errors.value.password = '请输入密码';
                        isValid = false;
                    } else if (loginForm.value.password.trim().length < 6) {
                        errors.value.password = '密码至少6个字符';
                        isValid = false;
                    }
                    
                    return isValid;
                };
                
                // 处理登录
                const handleLogin = async () => {
                    // 表单验证
                    if (!validateForm()) {
                        return;
                    }
                    
                    isLoading.value = true;
                    
                    try {
                        // 模拟登录请求
                        await new Promise(resolve => setTimeout(resolve, 1500));
                        
                        // 演示账号验证
                        const demoAccounts = {
                            teacher: { username: 'KQ002229', password: '002229', role: 'teacher' }
                        };
                        
                        let account = demoAccounts[loginForm.value.username.toLowerCase()];
                        
                        // 如果不是预设账号，检查教师账号
                        if (!account && loginForm.value.role === 'teacher') {
                            if (loginForm.value.username === 'KQ002229' && loginForm.value.password === '002229') {
                                account = { username: 'KQ002229', password: '002229', role: 'teacher' };
                            }
                        }
                        
                        // 学生账号列表（用户名:密码:显示名称）
                        const studentAccounts = {
                            '2021303041013': { password: '041013', displayName: '同学' },
                            '2021303041011': { password: '041011', displayName: '同学' },
                            '2021303041004': { password: '041004', displayName: '同学' },
                            '2021303043008': { password: '043008', displayName: '同学' },
                            '2021303042025': { password: '042025', displayName: '同学' },
                            '2021303043025': { password: '043025', displayName: '同学' },
                            '2021303042027': { password: '042027', displayName: '同学' },
                            '2021303042003': { password: '042003', displayName: '同学' },
                            '2021303042005': { password: '042005', displayName: '同学' },
                            '2021303043009': { password: '043009', displayName: '同学' },
                            '2021303043013': { password: '043013', displayName: '同学' },
                            '2021303043012': { password: '043012', displayName: '同学' },
                            '2021303043001': { password: '043001', displayName: '同学' },
                            '2021303043011': { password: '043011', displayName: '同学' },
                            '2021303043005': { password: '043005', displayName: '同学' },
                            '2021303042007': { password: '042007', displayName: '刘婧怡' },
                            '2022303042016': { password: '042016', displayName: '同学' },
                            '2022303041001': { password: '041001', displayName: '同学' },
                            '2022303042026': { password: '042026', displayName: '同学' },
                            '2022303042005': { password: '042005', displayName: '同学' },
                            '2022303042033': { password: '042033', displayName: '同学' },
                            '2022303042028': { password: '042028', displayName: '同学' },
                            '2022303042029': { password: '042029', displayName: '同学' },
                            '2022303042025': { password: '042025', displayName: '同学' },
                            '2022303042017': { password: '042017', displayName: '同学' }
                        };
                        
                        // 如果不是预设账号，检查学生账号
                        if (!account && loginForm.value.role === 'student') {
                            const accountInfo = studentAccounts[loginForm.value.username];
                            if (accountInfo && loginForm.value.password === accountInfo.password) {
                                account = { username: loginForm.value.username, password: loginForm.value.password, role: 'student', displayName: accountInfo.displayName };
                            }
                        }
                        
                        if (account && account.password === loginForm.value.password && account.role === loginForm.value.role) {
                            // 登录成功
                            console.log('登录成功:', loginForm.value);
                            
                            // 保存登录信息到localStorage
                            localStorage.setItem('userRole', loginForm.value.role);
                            localStorage.setItem('isGuest', 'false');
                            localStorage.setItem('username', account.username);
                            localStorage.setItem('displayName', account.displayName || '同学');
                            
                            // 根据角色跳转到不同页面
                            if (loginForm.value.role === 'teacher') {
                                window.location.href = 'pc/pc-template.html';
                            } else {
                                window.location.href = 'pc/pc-student-index.html';
                            }
                        } else {
                            // 登录失败
                            throw new Error('用户名或密码错误');
                        }
                        
                    } catch (error) {
                        console.error('登录失败:', error);
                        
                        // 显示错误信息
                        if (error.message.includes('用户名或密码')) {
                            errors.value.password = '用户名或密码错误';
                        } else {
                            errors.value.password = '登录失败，请稍后重试';
                        }
                    } finally {
                        isLoading.value = false;
                    }
                };
                
                // 处理游客模式登录
                const handleGuestLogin = async () => {
                    isLoading.value = true;
                    
                    try {
                        // 模拟登录请求
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        // 保存游客模式信息到localStorage
                        localStorage.setItem('userRole', 'guest');
                        localStorage.setItem('isGuest', 'true');
                        
                        console.log('游客模式登录成功');
                        
                        // 跳转到学生端页面
                        window.location.href = 'pc/pc-student-index.html';
                        
                    } catch (error) {
                        console.error('游客模式登录失败:', error);
                        alert('游客模式登录失败，请稍后重试');
                    } finally {
                        isLoading.value = false;
                    }
                };
                
                return {
                    loginForm,
                    errors,
                    isLoading,
                    isFormValid,
                    clearError,
                    handleLogin,
                    handleGuestLogin
                };
            }
        });
        
        app.mount('#app');
    </script>
</body>
</html>
